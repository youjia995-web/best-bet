services:
  - type: web
    name: best-bet
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: ODDS_API_IO_KEY
        sync: false
